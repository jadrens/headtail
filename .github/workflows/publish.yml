name: Publish Nightly Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., nightly, 1.1.0)'
        required: true
        default: 'nightly'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        run: echo "DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Build Linux (with CPack)
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cd build
          cpack -G "RPM;DEB;TGZ" # 优化点 1：单行命令生成三种格式

      - name: Build Windows (Cross-compile)
        run: |
          sudo apt-get update && sudo apt-get install -y mingw-w64 cmake
          cmake -B build-windows \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=i686-w64-mingw32-wrc \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build build-windows --config Release

      - name: Create Release & Upload Assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.version }}-${{ env.DATE }}"
          
          # 1. Delete previous release with same prefix
          gh release list --exclude-drafts --json tagName --jq '.[].tagName' | grep "^${{ github.event.inputs.version }}-" | while read oldtag; do
            echo "Deleting previous release: $oldtag"
            gh release delete "$oldtag" --yes || true
          done
          
          # 2. Create new release
          gh release create "$TAG" --title "headtail $TAG" --notes "Nightly build $TAG"
          
          # 3. Rename raw binaries
          cp build/headtail "headtail-$TAG-linux-x86_64"
          cp build-windows/headtail.exe "headtail-$TAG-windows.exe"
          
          # 4. Upload ALL assets in a single command (优化点 2：合并上传步骤)
          gh release upload "$TAG" \
            "headtail-$TAG-linux-x86_64" \
            "headtail-$TAG-windows.exe" \
            build/*.rpm \
            build/*.deb \
            build/*.tar.gz \
            --clobber
            
          # 5. Set as latest
          gh release edit "$TAG" --latest || true