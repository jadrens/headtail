name: Publish Nightly Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., nightly, 1.1.0)'
        required: true
        default: 'nightly'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current date
        id: date
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Set version
        run: echo "VERSION=${{ github.event.inputs.version }}-${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT

      - name: Build Linux
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cd build
          cpack -G RPM
          cpack -G DEB
          cpack -G TGZ
          cp headtail headtail-$VERSION-linux-x86_64

      - name: Build Windows
        run: |
          sudo apt-get update && sudo apt-get install -y mingw-w64 cmake
          cmake -B build-windows \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=i686-w64-mingw32-wrc \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          cmake --build build-windows --config Release
          cp build-windows/headtail.exe headtail-$VERSION-windows.exe

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create $VERSION \
            --title "headtail $VERSION" \
            --notes "Nightly build $VERSION" \
            --draft

      - name: Upload Linux binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload $VERSION build/headtail-$VERSION-linux-x86_64 --clobber

      - name: Upload Windows exe
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload $VERSION headtail-$VERSION-windows.exe --clobber

      - name: Upload RPM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload $VERSION build/*.rpm --clobber

      - name: Upload DEB
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload $VERSION build/*.deb --clobber

      - name: Upload TGZ
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload $VERSION build/*.tar.gz --clobber

      - name: Set release as latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit $VERSION --latest